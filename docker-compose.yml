services:
  monolith-db:
    image: postgres:16
    container_name: monolith-db
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: monolith_db
    ports:
      - "5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monolith_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16
    container_name: order-db
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ordering_system
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordering_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  eureka-server:
    image:  bhasinsaurav/eureka-server:s1
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: "curl --fail --silent localhost:8761/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ordering-system:
    image: "bhasinsaurav/ordering-system:s1"
    container_name: ordering-system_ms
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      monolith-db:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "ordering-system"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://monolith-db:5432/monolith_db"
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  order-service:
    image: "bhasinsaurav/order-service:s1"
    container_name: order-service_ms
    depends_on:
      eureka-server:
        condition: service_healthy
      order-db:
        condition: service_healthy
      ordering-system:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "order-service"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://order-db:5432/ordering_system"
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

networks:
  default:
    name: ren-network
